set_override:
  name: Set override
  description: Temporarily or permanently override one device's powered/power_state result.
  fields:
    slug:
      required: true
      selector:
        text:
    powered:
      required: false
      selector:
        boolean:
    power_state:
      required: false
      selector:
        select:
          options:
            - "off"
            - "standby"
            - "idle"
            - "playing"
            - "unknown"
    expire_seconds:
      required: false
      selector:
        number:
          min: 1
          max: 2592000
          mode: box

clear_override:
  name: Clear override
  description: Clear the active override for one device.
  fields:
    slug:
      required: true
      selector:
        text:

bulk_import:
  name: Bulk import (agent/MCP)
  description: >
    Import devices/combineds/light_groups from a YAML payload. Returns a report
    (accepted/blocked, missing_required, derived sources, resulting entity_ids).
    Default dry_run=true (validate only). Set dry_run=false to apply,
    replace=true for a clean slate (existing entries are cleared).
  fields:
    payload:
      required: true
      selector:
        text:
          multiline: true
    dry_run:
      required: false
      default: true
      selector:
        boolean:
    replace:
      required: false
      default: false
      selector:
        boolean:

export_config:
  name: Export config (agent/MCP)
  description: Return the current devices/combineds/light_groups config as YAML.

import_file_dry_run:
  name: Import file dry run (agent/MCP)
  description: >
    Read <config>/benni_core_devices/import.yaml, validate it with the same
    logic as bulk_import, and return the import report without writing changes.

import_file_apply:
  name: Import file apply (agent/MCP)
  description: >
    Read <config>/benni_core_devices/import.yaml and apply it with the same
    logic as bulk_import. Set top-level replace: true in the file for a clean
    slate; otherwise entries are merged.

